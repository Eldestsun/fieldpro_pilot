name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    # A healthy full run (migrate + seed + 153 tests) completes in well under
    # 10 minutes; a pool-exhaustion hang previously wedged the job for 27+.
    # Bound it so any future hang fails fast with a legible "timed out" signal.
    timeout-minutes: 12
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: fieldpro
          POSTGRES_PASSWORD: fieldpro_pass
          POSTGRES_DB: fieldpro_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: backend

      # ISSUE-041 alignment (fixes the CI break introduced when 20260624 landed):
      # the migration chain now assumes the PROVISIONER path — 20260624's guarded
      # step downgrades fieldpro from SUPERUSER mid-chain, so a superuser-fieldpro
      # runner fails on the very next fieldpro_admin-scoped statement on any FRESH
      # database (exactly CI's situation; every "Run migrations" step since has been
      # red). Mirror db/init/00_bootstrap_provisioner.sh: create fieldpro_admin as
      # the one-time superuser bootstrap, downgrade fieldpro, then run the chain AS
      # fieldpro_admin — the same sequence a compose init and the dev rebuild use.
      - name: Bootstrap provisioner role (mirrors db/init/00_bootstrap_provisioner.sh)
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'fieldpro_admin') THEN CREATE ROLE fieldpro_admin LOGIN NOSUPERUSER BYPASSRLS CREATEDB CREATEROLE; END IF; END \$\$;" \
            -c "ALTER ROLE fieldpro_admin WITH PASSWORD 'ci_admin_pw';" \
            -c "GRANT fieldpro TO fieldpro_admin;" \
            -c "CREATE EXTENSION IF NOT EXISTS pgcrypto WITH SCHEMA public;" \
            -c "ALTER ROLE fieldpro WITH NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE;"
        working-directory: backend
        env:
          DATABASE_URL: postgres://fieldpro:fieldpro_pass@localhost:5432/fieldpro_test

      - name: Run migrations
        run: pnpm run migrate
        working-directory: backend
        env:
          # Provisioner path (ISSUE-041): the runner connects as fieldpro_admin
          # (BYPASSRLS, member of fieldpro), matching compose init / dev rebuild.
          PGADMIN_DATABASE_URL: postgres://fieldpro_admin:ci_admin_pw@localhost:5432/fieldpro_test

      # Seed the minimal reference graph the canonical integration tests assume
      # (route_pool TEST_POOL + stop 31150 -> location mapping). Migrations create
      # schema only; without this the fixture setup fails (ISSUE-022 / ISSUE-009).
      # Idempotent SQL under tests/, not migrations/ — see the file header.
      # Runs as fieldpro_admin (BYPASSRLS) since fieldpro is no longer superuser;
      # the seed's own defensive set_config covers the org scoping either way.
      - name: Seed test fixtures
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f tests/fixtures/seed.sql
        working-directory: backend
        env:
          DATABASE_URL: postgres://fieldpro_admin:ci_admin_pw@localhost:5432/fieldpro_test

      # ISSUE-025: the postgres:14 service image makes POSTGRES_USER=fieldpro a
      # SUPERUSER, and superusers bypass RLS even on FORCE ROW LEVEL SECURITY
      # tables. The app's runtime role is a NON-superuser, so RLS-enforcement
      # tests (audit_log RLS x2, audit_log_delete policy x3, loadRouteRunById
      # cross-tenant fail-closed x1) were green on CI only because RLS was being
      # bypassed — the opposite of what they assert. Create a non-superuser,
      # non-BYPASSRLS role that inherits fieldpro's grants via role membership
      # (the faithful "same grants minus superuser"), and run the tests as it so
      # RLS is actually enforced. (fieldpro itself is also downgraded now — see
      # the bootstrap step — but fieldpro_test remains the dedicated test login.)
      # Runs as fieldpro_admin (CREATEROLE). This is CI-only; it does not touch
      # backend/src/db.ts, the app pool, or the intelligence_reader runtime-role
      # decision (ISSUE-018).
      - name: Create non-superuser test role (RLS enforcement — ISSUE-025)
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -c "DROP ROLE IF EXISTS fieldpro_test;" \
            -c "CREATE ROLE fieldpro_test LOGIN PASSWORD 'fieldpro_test_pass' NOSUPERUSER NOBYPASSRLS INHERIT;" \
            -c "GRANT fieldpro TO fieldpro_test;"
        working-directory: backend
        env:
          DATABASE_URL: postgres://fieldpro_admin:ci_admin_pw@localhost:5432/fieldpro_test

      # S1-13 env parity: the DEV/TEST cipher adapter (DevStaticKeyAdapter,
      # src/lib/oidCipher.ts) requires DEV_OID_KEY — a 32-byte hex key (64 hex
      # chars). Locally it lives in gitignored backend/.env; CI had nothing, so
      # 24 tests (every ensureVisitForRouteRunStop path + oidCipher's own) died
      # at env validation before touching a DB row. A THROWAWAY per-run key is
      # correct: nothing encrypted with it outlives the ephemeral CI Postgres,
      # and no test asserts a fixed ciphertext (the cipher tests generate and
      # save/restore their own keys). This is NOT a production secret — prod
      # selects the Azure Key Vault adapter (NODE_ENV=production, ISSUE-045
      # track); the KV path is untouched. GITHUB_ENV propagates the var to all
      # subsequent steps, including "Run tests".
      - name: Generate throwaway DEV_OID_KEY (S1-13 dev cipher adapter)
        run: echo "DEV_OID_KEY=$(openssl rand -hex 32)" >> "$GITHUB_ENV"

      - name: Run tests
        run: pnpm test
        working-directory: backend
        env:
          # Connect as the non-superuser fieldpro_test so FORCE RLS is enforced
          # (see "Create non-superuser test role" above / ISSUE-025).
          DATABASE_URL: postgres://fieldpro_test:fieldpro_test_pass@localhost:5432/fieldpro_test
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_API_AUDIENCE: ${{ secrets.AZURE_API_AUDIENCE }}

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: /api

  # S1-10: Dependency vulnerability gate — fails the build on any HIGH or CRITICAL advisory.
  # Enforces S1-10 done-criteria: both backend/ and frontend/ workspaces must be clean
  # before merging to main. LOW and MODERATE findings do not block CI (documented in
  # docs/security/dependency-audit-2026-05-13.md).
  #
  # Scanner: osv-scanner (reads the pnpm lockfiles against the OSV database). It
  # replaced `pnpm audit --audit-level=high`, which broke repo-wide when npm retired
  # the legacy audit endpoint pnpm calls (HTTP 410 — "use the bulk advisory endpoint").
  # osv-scanner has no dependency on npm's audit endpoint, but its own exit code fails
  # on ANY advisory (Low/Medium included); .github/scripts/osv-severity-gate.py
  # re-imposes the exact HIGH/CRITICAL-only posture on top of its JSON output.
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install osv-scanner
        run: |
          curl -sSfL "https://github.com/google/osv-scanner/releases/download/v2.4.0/osv-scanner_linux_amd64" -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --version

      - name: Scan lockfiles (backend + frontend)
        # osv-scanner exits non-zero when it finds ANY advisory; capture the JSON
        # regardless and let the severity gate decide. `|| true` swallows only that
        # any-advisory exit — a genuine tool/network failure leaves no report, which
        # the gate treats as exit 2 (fail loud), so this never silently passes.
        run: |
          osv-scanner scan \
            --lockfile=backend/pnpm-lock.yaml \
            --lockfile=frontend/pnpm-lock.yaml \
            --format=json > osv-report.json || true

      - name: Gate on HIGH or CRITICAL (S1-10 policy)
        run: python3 .github/scripts/osv-severity-gate.py osv-report.json

  build-docker-images:
    needs: [test-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t baseline-backend:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t baseline-frontend:${{ github.sha }} ./frontend
