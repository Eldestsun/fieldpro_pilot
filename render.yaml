services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: baseline-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: baseline-db
          property: connectionString
      - fromGroup: baseline-secrets

  # ── Frontend ───────────────────────────────────────────────────────────────
  # Deployed as a Docker web service so nginx can proxy /api/* to the backend.
  # (A static site cannot proxy requests to a separate origin on free tier.)
  - type: web
    name: baseline-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      # Set to the backend's actual Render URL (check Render dashboard for the hash suffix).
      - key: BACKEND_URL
        value: https://baseline-backend.onrender.com

databases:
  # ── Postgres ───────────────────────────────────────────────────────────────
  # Free tier: 1 GB storage, 90-day expiry. Upgrade plan before pilot goes live.
  - name: baseline-db
    plan: free
    databaseName: baseline_db
    user: baseline
